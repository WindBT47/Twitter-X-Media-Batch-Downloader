name: Package App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libxrender-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev

      - name: Build extractor binary
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller gallery-dl
          pyinstaller --onefile --name extractor --collect-all gallery_dl helper/twitter_cli.py
          mkdir -p backend/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp dist/extractor.exe backend/bin/extractor.exe
          else
            cp dist/extractor backend/bin/extractor
            chmod +x backend/bin/extractor
          fi

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build package
        run: wails build -clean

      - name: Upload package artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TwitterXMediaBatchDownloader-${{ runner.os }}
          path: build/bin/*.exe
          if-no-files-found: error

      - name: Upload package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: TwitterXMediaBatchDownloader-${{ runner.os }}
          path: build/bin/*
          if-no-files-found: error
